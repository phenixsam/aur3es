# Golden RNG Configuration File
# Default configuration for Golden RNG Enterprise

# Logging Configuration
[logging]
level = info          # error, warn, info, debug, trace
output = stderr       # stdout, stderr, file
use_colors = true
use_timestamps = true
log_file = /var/log/goldenrng.log

# Security Configuration
[security]
enable_rate_limiting = true
min_generation_interval_ms = 0
enable_strict_mode = false
max_buffer_size = 1073741824    # 1 GB
max_seed_size = 1024            # 1 KB

# Entropy Configuration
[entropy]
primary_source = openssl        # openssl, /dev/urandom
backup_source = /dev/urandom
reseed_interval = 70000
entropy_quality_threshold = 80

# Performance Configuration
[performance]
default_buffer_size = 10485760  # 10 MB
default_threads = 0              # 0 = auto-detect
enable_simd = true
memory_pool_size = 1048576      # 1 MB

# Monitoring Configuration
[monitoring]
enable_monitoring = true
health_check_interval = 60       # seconds
metrics_interval = 300          # seconds
enable_health_callback = false

